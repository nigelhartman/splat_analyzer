<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WorldModelData</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 24px; height: 54px; flex-shrink: 0;
      background: rgba(13,17,23,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 50;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 700; color: #58a6ff; letter-spacing: -0.3px;
      text-decoration: none;
    }
    .logo svg { flex-shrink: 0; }
    header nav { display: flex; gap: 2px; margin-left: auto; }
    header nav a {
      padding: 5px 11px; border-radius: 6px; font-size: 13px;
      color: #8b949e; text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    header nav a:hover { background: rgba(255,255,255,0.06); color: #e6edf3; }
    .header-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.08); }
    #settings-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 6px; font-size: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #8b949e; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #settings-btn:hover, #settings-btn.open { background: rgba(255,255,255,0.1); color: #e6edf3; }

    /* ── Settings flyout ── */
    #settings-flyout {
      display: none; position: fixed;
      top: 54px; right: 12px; z-index: 200;
      width: 280px; padding: 16px;
      background: rgba(13,17,23,0.98);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      backdrop-filter: blur(16px);
    }
    #settings-flyout.open { display: block; }
    .fly-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: #6e7681; margin-bottom: 7px;
    }
    .fly-input {
      width: 100%; padding: 7px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: #e6edf3; font-size: 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      outline: none; transition: border-color 0.15s;
    }
    .fly-input:focus { border-color: #388bfd; }
    .fly-hint { font-size: 10px; color: #6e7681; margin-top: 5px; }
    .fly-hint.ok  { color: #3fb950; }
    .fly-hint.err { color: #f85149; }

    /* ── Main ── */
    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 40px 20px 60px;
      gap: 24px;
    }
    .card {
      width: 100%; max-width: 580px;
      background: rgba(22,27,34,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; overflow: hidden;
    }
    .card-body { padding: 24px; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed rgba(255,255,255,0.1);
      border-radius: 8px; padding: 32px 20px;
      text-align: center; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: #388bfd; background: rgba(56,139,253,0.04); }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-icon { color: #4a5568; margin-bottom: 10px; }
    .upload-title { font-size: 14px; color: #8b949e; }
    .upload-title span { color: #58a6ff; }
    .upload-sub { font-size: 11px; color: #4a5568; margin-top: 4px; }
    .file-selected {
      display: none; align-items: center; gap: 10px;
      padding: 10px 14px; margin-top: 10px;
      background: rgba(56,139,253,0.08);
      border: 1px solid rgba(56,139,253,0.2);
      border-radius: 6px;
    }
    .file-selected.show { display: flex; }
    .file-selected svg { color: #58a6ff; flex-shrink: 0; }
    .file-name-text { font-size: 13px; color: #e6edf3; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { font-size: 11px; color: #8b949e; flex-shrink: 0; }

    /* ── Form fields ── */
    .field { margin-top: 16px; }
    .field label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 6px; }
    .field input[type=text] {
      width: 100%; padding: 8px 11px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: #e6edf3; font-size: 13px;
      outline: none; transition: border-color 0.15s, background 0.15s;
    }
    .field input:focus { border-color: #388bfd; background: rgba(56,139,253,0.04); }
    .field input::placeholder { color: #3d444d; }

    /* ── Action button ── */
    #run-btn {
      margin-top: 18px; width: 100%; padding: 10px;
      background: #238636; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    #run-btn:hover:not(:disabled) { background: #2ea043; }
    #run-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #run-btn.loading { background: #1a3a26; }

    /* ── Progress ── */
    #progress-section { display: none; padding: 18px 24px; border-top: 1px solid rgba(255,255,255,0.06); }
    #progress-section.show { display: block; }
    .progress-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,#388bfd,#58a6ff); border-radius: 2px; transition: width 0.4s ease; box-shadow: 0 0 8px #388bfd80; }
    .progress-msg { font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 8px; }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.08); border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.75s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    #error-box {
      display: none; padding: 12px 14px; margin: 0 24px 16px;
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 6px; font-size: 12px; color: #f85149;
    }
    #error-box.show { display: block; }

    /* ── Results ── */
    #results-card {
      display: none; width: 100%; max-width: 580px;
      background: rgba(22,27,34,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; overflow: hidden;
    }
    #results-card.show { display: block; }
    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .results-title { font-size: 13px; font-weight: 600; color: #e6edf3; display: flex; align-items: center; gap: 8px; }
    .results-badge {
      background: rgba(255,255,255,0.08); padding: 2px 8px;
      border-radius: 10px; font-size: 11px; font-weight: 400; color: #8b949e;
    }
    .results-actions { display: flex; gap: 8px; }
    .action-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 11px; border-radius: 6px; font-size: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); color: #e6edf3;
      cursor: pointer; text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .action-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .action-btn.primary { background: rgba(56,139,253,0.1); border-color: rgba(56,139,253,0.3); color: #58a6ff; }
    .action-btn.primary:hover { background: rgba(56,139,253,0.18); }

    /* ── Objects list ── */
    #objects-list { padding: 6px 0; }
    .obj-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .obj-row:last-child { border-bottom: none; }
    .obj-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0; box-shadow: 0 0 7px currentColor;
    }
    .obj-info { flex: 1; min-width: 0; }
    .obj-label { font-size: 13px; font-weight: 500; text-transform: capitalize; }
    .obj-pos {
      font-size: 10px; color: #6e7681; margin-top: 2px;
      font-family: "SF Mono","Fira Code",monospace;
    }
    .obj-size { font-size: 11px; color: #8b949e; text-align: right; flex-shrink: 0; font-family: "SF Mono","Fira Code",monospace; }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 24px;
      font-size: 11px; color: #3d444d;
    }
    footer a { color: #4a5568; text-decoration: none; }
    footer a:hover { color: #8b949e; }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
      <line x1="12" y1="22" x2="12" y2="15.5"/>
      <polyline points="22 8.5 12 15.5 2 8.5"/>
    </svg>
    WorldModelData
  </a>
  <nav>
    <a href="/debug">3D Debug View</a>
    <a href="/docs">API Docs</a>
    <a href="/admin">Admin</a>
  </nav>
  <div class="header-sep"></div>
  <button id="settings-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    Settings
  </button>
</header>

<!-- Settings flyout -->
<div id="settings-flyout">
  <div class="fly-label">API Key</div>
  <input class="fly-input" type="password" id="api-key-input"
         placeholder="wmd_…" autocomplete="off" spellcheck="false">
  <div class="fly-hint" id="api-key-hint">No key set</div>
</div>

<main>
  <div class="card">
    <div class="card-body">

      <!-- Upload zone -->
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept=".ply,.splat">
        <div class="upload-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
        </div>
        <div class="upload-title">Drop <strong>.ply</strong> file here or <span>browse</span></div>
        <div class="upload-sub">Gaussian Splat file</div>
      </div>

      <div class="file-selected" id="file-selected">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0113.25 16h-9.5A1.75 1.75 0 012 14.25V1.75zm1.75-.25a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 00.25-.25V6h-2.75A1.75 1.75 0 018 4.25V1.5H3.75zm6.75.5v2.25c0 .138.112.25.25.25h2.25L10.5 2z"/>
        </svg>
        <span class="file-name-text" id="file-name-text"></span>
        <span class="file-size" id="file-size-text"></span>
      </div>

      <div class="field">
        <label for="prompt-input">Object classes to detect</label>
        <input type="text" id="prompt-input"
               placeholder="e.g. sofa, chair, television, table"
               value="television, sofa, armchair, chair">
      </div>

      <button id="run-btn" disabled>Run Detection →</button>
    </div>

    <div id="progress-section">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-msg"><div class="spinner"></div><span id="progress-msg">Uploading…</span></div>
    </div>

    <div id="error-box"></div>
  </div>

  <!-- Results card -->
  <div id="results-card">
    <div class="results-header">
      <div class="results-title">
        Detected Objects
        <span class="results-badge" id="obj-count">0</span>
      </div>
      <div class="results-actions">
        <button class="action-btn" id="dl-json-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          JSON
        </button>
        <a class="action-btn primary" id="debug-link" href="/debug">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/></svg>
          3D Viewer
        </a>
      </div>
    </div>
    <div id="objects-list"></div>
  </div>
</main>

<footer>
  WorldModelData &nbsp;·&nbsp;
  <a href="/docs">API Reference</a> &nbsp;·&nbsp;
  <a href="/debug">3D Debug View</a> &nbsp;·&nbsp;
  <a href="/admin">Admin Panel</a>
</footer>

<script>
  const COLOURS = {
    television:"#00e5ff",tv:"#00e5ff",monitor:"#00e5ff",screen:"#00e5ff",
    sofa:"#00ff88",couch:"#00ff88",
    armchair:"#ffaa00",chair:"#ffaa00",
    desk:"#ff69b4",table:"#ff69b4",
    "air conditioner":"#4488ff",
    bed:"#c084fc",cabinet:"#e879f9",wardrobe:"#e879f9",
    lamp:"#fde047",light:"#fde047",
    refrigerator:"#67e8f9",fridge:"#67e8f9",
  };
  function labelColour(label) {
    const l = label.toLowerCase();
    for (const [k,v] of Object.entries(COLOURS)) if (l.includes(k)) return v;
    return "#8b949e";
  }

  // ── API key ──────────────────────────────────────────────────────────────
  const apiKeyInput = document.getElementById("api-key-input");
  const apiKeyHint  = document.getElementById("api-key-hint");
  const settingsBtn = document.getElementById("settings-btn");
  const settingsFly = document.getElementById("settings-flyout");

  function getApiKey() { return localStorage.getItem("wmd_api_key") || ""; }

  function updateKeyHint() {
    const k = getApiKey();
    if (k) {
      apiKeyHint.textContent = "Key set: " + k.slice(0,12) + "…";
      apiKeyHint.className = "fly-hint ok";
    } else {
      apiKeyHint.textContent = "No key — enter your API key above";
      apiKeyHint.className = "fly-hint err";
    }
  }

  apiKeyInput.value = getApiKey();
  updateKeyHint();

  apiKeyInput.addEventListener("input", () => {
    localStorage.setItem("wmd_api_key", apiKeyInput.value.trim());
    updateKeyHint();
  });

  settingsBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    settingsFly.classList.toggle("open");
    settingsBtn.classList.toggle("open", settingsFly.classList.contains("open"));
  });
  document.addEventListener("click", (e) => {
    if (!settingsFly.contains(e.target) && e.target !== settingsBtn) {
      settingsFly.classList.remove("open");
      settingsBtn.classList.remove("open");
    }
  });

  // ── File handling ────────────────────────────────────────────────────────
  const fileInput     = document.getElementById("file-input");
  const uploadZone    = document.getElementById("upload-zone");
  const fileSelected  = document.getElementById("file-selected");
  const fileNameText  = document.getElementById("file-name-text");
  const fileSizeText  = document.getElementById("file-size-text");
  const runBtn        = document.getElementById("run-btn");
  let selectedFile    = null;

  function setFile(file) {
    if (!file) return;
    selectedFile = file;
    fileNameText.textContent = file.name;
    fileSizeText.textContent = (file.size / 1048576).toFixed(1) + " MB";
    fileSelected.classList.add("show");
    runBtn.disabled = false;
  }

  fileInput.addEventListener("change", (e) => setFile(e.target.files[0]));

  uploadZone.addEventListener("dragover",  (e) => { e.preventDefault(); uploadZone.classList.add("drag"); });
  uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag"));
  uploadZone.addEventListener("drop", (e) => {
    e.preventDefault();
    uploadZone.classList.remove("drag");
    const f = e.dataTransfer?.files[0];
    if (f) setFile(f);
  });

  // ── Detection flow ───────────────────────────────────────────────────────
  const progressSection = document.getElementById("progress-section");
  const progressFill    = document.getElementById("progress-fill");
  const progressMsg     = document.getElementById("progress-msg");
  const errorBox        = document.getElementById("error-box");
  const resultsCard     = document.getElementById("results-card");
  const objectsList     = document.getElementById("objects-list");
  const objCount        = document.getElementById("obj-count");
  const dlJsonBtn       = document.getElementById("dl-json-btn");
  const debugLink       = document.getElementById("debug-link");
  let lastJobId         = null;
  let lastObjects       = [];

  function showProgress(msg, pct) {
    progressSection.classList.add("show");
    progressMsg.textContent = msg;
    progressFill.style.width = pct + "%";
  }
  function hideProgress() {
    progressSection.classList.remove("show");
    progressFill.style.width = "0%";
  }
  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add("show");
  }
  function hideError() { errorBox.classList.remove("show"); }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  let pctTicker = null;
  function startProgressTicker(from) {
    let pct = from;
    pctTicker = setInterval(() => {
      pct = Math.min(pct + (88 - pct) * 0.025, 88);
      progressFill.style.width = pct + "%";
    }, 1200);
  }
  function stopTicker() { clearInterval(pctTicker); pctTicker = null; }

  runBtn.addEventListener("click", async () => {
    const key = getApiKey();
    if (!key) {
      settingsFly.classList.add("open");
      settingsBtn.classList.add("open");
      showError("Enter your API key in Settings first.");
      return;
    }
    if (!selectedFile) return;

    runBtn.disabled = true;
    runBtn.classList.add("loading");
    runBtn.textContent = "Running…";
    hideError();
    resultsCard.classList.remove("show");

    try {
      // 1. Submit
      showProgress("Uploading file…", 5);
      const form = new FormData();
      form.append("file",   selectedFile);
      form.append("prompt", document.getElementById("prompt-input").value);
      const submitRes = await fetch("/api/v1/detect", {
        method: "POST",
        headers: { "X-API-Key": key },
        body: form,
      });
      if (!submitRes.ok) throw new Error("Submit failed: " + (await submitRes.text()).slice(0,200));
      const { job_id } = await submitRes.json();
      lastJobId = job_id;

      // 2. Poll
      showProgress("Job queued — rendering camera views…", 12);
      startProgressTicker(12);

      let phase = "pending";
      while (true) {
        await sleep(3500);
        const sr = await fetch(`/api/v1/jobs/${job_id}/status`, { headers: { "X-API-Key": key } });
        if (!sr.ok) throw new Error("Status check failed");
        const { status } = await sr.json();
        phase = status;
        if (status === "done") break;
        if (status === "failed") throw new Error("Detection pipeline failed on server.");
        progressMsg.textContent = status === "running"
          ? "Rendering + detecting objects (~2-3 min)…"
          : "Starting pipeline…";
      }

      stopTicker();
      showProgress("Loading results…", 96);

      // 3. Fetch result
      const rr = await fetch(`/api/v1/jobs/${job_id}/result`, { headers: { "X-API-Key": key } });
      if (!rr.ok) throw new Error("Failed to fetch result");
      const data = await rr.json();
      lastObjects = data.objects || [];

      progressFill.style.width = "100%";
      await sleep(300);
      hideProgress();
      showResults(lastObjects, job_id, key);

    } catch (err) {
      stopTicker();
      hideProgress();
      showError(err.message);
      console.error(err);
    } finally {
      runBtn.disabled = false;
      runBtn.classList.remove("loading");
      runBtn.textContent = "Run Detection →";
    }
  });

  function showResults(objects, jobId, key) {
    objectsList.innerHTML = "";
    objCount.textContent = String(objects.length);

    if (!objects.length) {
      objectsList.innerHTML = '<div style="padding:20px;text-align:center;color:#6e7681;font-size:13px;">No objects found — try adjusting your class labels.</div>';
    } else {
      objects.forEach((obj) => {
        const col = labelColour(obj.label);
        const { x, y, z } = obj.position;
        const s = obj.size;
        const div = document.createElement("div");
        div.className = "obj-row";
        div.innerHTML = `
          <div class="obj-dot" style="background:${col};color:${col}"></div>
          <div class="obj-info">
            <div class="obj-label" style="color:${col}">${obj.label}</div>
            <div class="obj-pos">x:${x.toFixed(2)} y:${y.toFixed(2)} z:${z.toFixed(2)}</div>
          </div>
          <div class="obj-size">${s.x.toFixed(2)}×${s.y.toFixed(2)}×${s.z.toFixed(2)} m</div>`;
        objectsList.appendChild(div);
      });
    }

    debugLink.href = `/debug#job=${jobId}&key=${encodeURIComponent(key)}`;
    resultsCard.classList.add("show");
  }

  dlJsonBtn.addEventListener("click", () => {
    if (!lastObjects.length && !lastJobId) return;
    const payload = { job_id: lastJobId, objects: lastObjects };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const a = Object.assign(document.createElement("a"), {
      href: URL.createObjectURL(blob), download: "detections.json",
    });
    a.click(); URL.revokeObjectURL(a.href);
  });
</script>
</body>
</html>
